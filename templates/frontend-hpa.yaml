apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-autoscaler
  namespace: {{ .Values.namespace }}
spec:
  minReplicas: {{ .Values.hpa.frontend.minReplicas | default "1" }}
  maxReplicas: {{ .Values.hpa.frontend.maxReplicas | default "3" }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend-deployment
  targetCPUUtilizationPercentage: 75
