apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: {{ .Values.namespace }}
  labels:
    tier: frontend
spec:
  selector:
    app: frontend
    tier: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: {{ .Values.namespace }}
  labels:
    tier: frontend
spec:
  # replicas: 1
  selector:
    matchLabels:
      app: frontend
      tier: frontend
  template:
    metadata:
      labels:
        app: frontend
        tier: frontend
    spec:
      volumes:
        - name: {{ .Values.storage.pvcName }}
          persistentVolumeClaim:
            claimName: {{ .Values.storage.pvcName }}
      containers:
      - name: nginx
        image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        envFrom:
          - configMapRef:
              name: frontend-configmap
          - secretRef:
              name: frontend-secret
        resources:
          requests:
            cpu: {{ .Values.resources.frontend.requests.cpu | default "128m" }}
            memory: {{ .Values.resources.frontend.requests.memory | default "64Mi" }}
          limits:
            cpu: {{ .Values.resources.frontend.limits.cpu | default "256m" }}
            memory: {{ .Values.resources.frontend.limits.memory | default "128Mi" }}
      imagePullSecrets:
      - name: {{ .Values.image.imagePullSecrets }}

